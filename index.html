<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced PWA</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header class="app-header">
    <h1>Welcome to Advanced PWA</h1>
    <button id="theme-toggle">Toggle Theme</button>
  </header>

  <main>
    <section class="intro">
      <h2>Explore Features</h2>
      <p>Dynamic content, theme switching, offline storage, and more!</p>
    </section>

    <section class="data-display">
      <h2>Data from Local Storage</h2>
      <ul id="data-list">
        <!-- Dynamic content will be loaded here -->
      </ul>
      <button id="load-data">Load Mock Data</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Advanced PWA. All rights reserved.</p>
  </footer>

  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
